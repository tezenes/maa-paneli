<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DPÜ Spor Kulübü — Yönetim Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

.header{background:linear-gradient(135deg,#0d1b3e,#1a3a6e);color:white;padding:1rem 2rem;display:flex;align-items:center;gap:1rem;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.logo{width:46px;height:46px;background:#c9a227;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:900;flex-shrink:0}
.header h1{font-size:1.2rem;font-weight:800}
.header .sub{font-size:.78rem;opacity:.7;margin-top:.1rem}

.tabs{background:white;border-bottom:2px solid #e0e0e0;display:flex;padding:0 2rem;overflow-x:auto}
.tab{padding:1rem 1.2rem;border:none;background:transparent;font-size:.88rem;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.2s}
.tab.active{color:#0d1b3e;border-bottom-color:#c9a227}
.tab:hover:not(.active){color:#0d1b3e}
.tab-content{display:none;padding:2rem;max-width:1300px;margin:0 auto}
.tab-content.active{display:block}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:white;border-radius:16px;padding:1.3rem;box-shadow:0 2px 10px rgba(0,0,0,.06);border-left:4px solid #c9a227}
.slbl{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:.3rem}
.sval{font-size:1.6rem;font-weight:900;color:#0d1b3e}
.ssub{font-size:.73rem;color:#aaa;margin-top:.2rem}

/* BRANCH MINI CARDS */
.branch-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem}
.bcard-mini{background:white;border-radius:14px;padding:1.2rem;box-shadow:0 2px 10px rgba(0,0,0,.06);border-top:4px solid #ccc}
.bcard-mini .bname{font-weight:800;color:#0d1b3e;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem}
.binfo-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;font-size:.82rem}
.binfo-item .lbl{color:#888;font-size:.72rem}
.binfo-item .val{font-weight:700;margin-top:.1rem}

/* YOKLAMA */
.period-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.period-bar h2{font-size:1.2rem;font-weight:800;color:#0d1b3e}
.selects{display:flex;gap:.5rem}
.selects select{padding:.4rem .8rem;border:2px solid #e0e0e0;border-radius:8px;font-family:inherit;font-weight:600;font-size:.88rem}
.selects select:focus{outline:none;border-color:#0d1b3e}

.branch-section{background:white;border-radius:16px;padding:1.4rem;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:1.2rem}
.bsec-head{display:flex;align-items:center;gap:.7rem;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:2px solid #f0f0f0}
.bsec-head .emoji{font-size:1.7rem}
.bsec-head .bname{font-size:1.05rem;font-weight:800;color:#0d1b3e}
.coach-block{margin-bottom:1.2rem}
.coach-lbl{font-weight:700;font-size:.88rem;color:#0d1b3e;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.coach-lbl .days-count{font-weight:400;color:#888;font-size:.82rem}
.day-grid{display:flex;flex-wrap:wrap;gap:.35rem}
.day-btn{width:34px;height:34px;border-radius:7px;border:2px solid #e0e0e0;background:white;font-size:.78rem;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;color:#555}
.day-btn.on{background:#22c55e;border-color:#22c55e;color:white}
.day-btn:hover:not(.on){border-color:#0d1b3e;background:#f0f4ff}

.yok-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{padding:.5rem 1rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:.18s;display:inline-flex;align-items:center;gap:.3rem}
.btn:hover{filter:brightness(.92)}
.btn-outline{background:transparent;border:2px solid #0d1b3e;color:#0d1b3e}
.btn-danger{background:#ef4444;color:white}
.btn-gold{background:#c9a227;color:#1a1a2e}
.btn-sm{padding:.3rem .7rem;font-size:.78rem}

/* RAPOR */
.rpt-table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.rpt-table thead{background:linear-gradient(135deg,#0d1b3e,#1a3a6e)}
.rpt-table thead th{padding:.9rem 1rem;color:white;font-size:.76rem;font-weight:700;text-align:left;text-transform:uppercase;letter-spacing:.5px}
.rpt-table tbody tr{border-bottom:1px solid #f0f0f0;transition:.15s}
.rpt-table tbody tr:hover{background:#f8f9fa}
.rpt-table tbody td{padding:.85rem 1rem;font-size:.86rem}
.rpt-table tfoot td{padding:.9rem 1rem;font-weight:800;background:#f0f2f5;font-size:.9rem}
.branch-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:700}
.pay-cell{font-weight:800;color:#16a34a}

/* GELİR INPUT */
.inc-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:.8rem 1rem;margin-bottom:1.2rem}
.inc-bar-inner{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.inc-bar label{font-size:.82rem;font-weight:800;color:#92400e;white-space:nowrap}
.inc-bar input{padding:.45rem .8rem;border:2px solid #e0e0e0;border-radius:8px;font-size:.9rem;font-family:inherit;width:160px}
.inc-bar input:focus{outline:none;border-color:#c9a227}
.inc-summary{display:flex;gap:1.5rem;margin-top:.6rem;font-size:.82rem;flex-wrap:wrap}
.inc-summary span{font-weight:700}
.inc-summary .lbl{font-weight:400;color:#888}

/* ANTRENÖR ÖZETİ */
.coach-table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.coach-table thead{background:linear-gradient(135deg,#0d1b3e,#1a3a6e)}
.coach-table thead th{padding:.9rem 1rem;color:white;font-size:.76rem;font-weight:700;text-align:left;text-transform:uppercase;letter-spacing:.5px}
.coach-table tbody tr{border-bottom:1px solid #f0f0f0;transition:.15s}
.coach-table tbody tr:hover{background:#f8f9fa}
.coach-table tbody td{padding:.9rem 1rem;font-size:.86rem}

/* TOAST */
#toast{position:fixed;bottom:1.8rem;right:1.8rem;background:#0d1b3e;color:white;padding:.75rem 1.4rem;border-radius:12px;font-size:.86rem;font-weight:700;opacity:0;transform:translateY(14px);transition:.3s;z-index:9999;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

/* LOADING */
#loadingOverlay{position:fixed;inset:0;background:rgba(13,27,62,.85);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
#loadingOverlay.show{display:flex}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.2);border-top-color:#c9a227;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{color:white;font-size:.9rem;font-weight:600}

@media(max-width:768px){
  .tab-content{padding:1rem}
  .stat-grid{grid-template-columns:1fr 1fr}
  .header{padding:.8rem 1rem}
  .tabs{padding:0 .5rem}
  .tab{padding:.75rem .8rem;font-size:.8rem}
}
</style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><div class="spin-txt" id="spinTxt">Yükleniyor...</div></div>

<div class="header">
  <div class="logo">DPÜ</div>
  <div><h1>DPÜ Spor Kulübü</h1><div class="sub">Yönetim Paneli</div></div>
</div>

<div class="tabs" id="tabBar">
  <button class="tab active" onclick="showTab(this,'dashboard')">📊 Genel Bakış</button>
  <button class="tab" onclick="showTab(this,'yoklama')">📋 Yoklama</button>
  <button class="tab" onclick="showTab(this,'rapor')">💰 Ödeme Raporu</button>
  <button class="tab" onclick="showTab(this,'antrenorler')">👥 Antrenör Özeti</button>
</div>

<!-- DASHBOARD -->
<div class="tab-content active" id="tab-dashboard">
  <div class="period-bar">
    <div><h2>Genel Bakış</h2><div style="font-size:.82rem;color:#888;margin-top:.2rem" id="dashPeriod"></div></div>
    <div class="selects">
      <select id="selYear" onchange="changeDate()"></select>
      <select id="selMonth" onchange="changeDate()"></select>
    </div>
  </div>
  <div class="stat-grid" id="dashStats"></div>
  <div class="branch-cards" id="dashCards"></div>
</div>

<!-- YOKLAMA -->
<div class="tab-content" id="tab-yoklama">
  <div class="period-bar">
    <h2>Aylık Yoklama</h2>
    <div class="yok-actions">
      <button class="btn btn-outline btn-sm" onclick="markAll(true)">✅ Tümünü İşaretle</button>
      <button class="btn btn-outline btn-sm" onclick="markAll(false)">☐ Temizle</button>
      <button class="btn btn-danger btn-sm" onclick="resetMonth()">🗑 Ayı Sıfırla</button>
    </div>
  </div>
  <div id="yoklamaContent"></div>
</div>

<!-- RAPOR -->
<div class="tab-content" id="tab-rapor">
  <div class="period-bar">
    <h2>Ödeme Raporu</h2>
    <button class="btn btn-gold btn-sm" onclick="exportCSV()">📥 CSV İndir</button>
  </div>
  <div id="raporContent"></div>
</div>

<!-- ANTRENÖR ÖZETİ -->
<div class="tab-content" id="tab-antrenorler">
  <div class="period-bar"><h2>Antrenör Özeti</h2></div>
  <div id="antrenorContent"></div>
</div>

<div id="toast"></div>

<script>
// ── VERİ ──
const SK = 'dpusk_v4';
const MONTHS = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

const DEFAULT_BRANCHES = [
  {id:'yuzme',     name:'Yüzme',      emoji:'🏊', color:'#0077b6',
   coaches:[{id:'y1',name:'Gizem Yerlikaya',weight:2}], dailyRate:750},
  {id:'voleybol',  name:'Voleybol',   emoji:'🏐', color:'#1a3a6e',
   coaches:[{id:'v1',name:'Gizem Yerlikaya',weight:2}], dailyRate:750},
  {id:'basketbol', name:'Basketbol',  emoji:'🏀', color:'#c8102e',
   coaches:[{id:'b1',name:'Hamdi',weight:2}], dailyRate:750},
  {id:'tenis',     name:'Tenis',      emoji:'🎾', color:'#2e7d32',
   coaches:[{id:'t1',name:'Metin',weight:2}], dailyRate:750},
  {id:'jimnastik', name:'Jimnastik',  emoji:'🤸', color:'#6a1b9a',
   coaches:[{id:'j1',name:'Ömer',weight:2}], dailyRate:750},
  {id:'masatenisi',name:'Masa Tenisi',emoji:'🏓', color:'#e65100',
   coaches:[{id:'m1',name:'Şahika Yurttaş',weight:2}], dailyRate:750},
  {id:'zumba',     name:'Zumba',      emoji:'💃', color:'#880e4f',
   coaches:[{id:'z1',name:'Şahika Yurttaş',weight:2}], dailyRate:750},
  {id:'pilates',   name:'Pilates',    emoji:'🧘', color:'#004d40',
   coaches:[{id:'p1',name:'Şahika Yurttaş',weight:2}], dailyRate:750},
];

function loadState(){
  try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch{return null;}
}
function saveState(s){localStorage.setItem(SK,JSON.stringify(s));}

let S = loadState() || {branches:JSON.parse(JSON.stringify(DEFAULT_BRANCHES)), attendance:{}, income:{}};
// eski veri yoksa varsayılanları ekle
if(!S.branches) S.branches = JSON.parse(JSON.stringify(DEFAULT_BRANCHES));
if(!S.attendance) S.attendance = {};
if(!S.income) S.income = {};

let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth()+1;

// ── YARDIMCILAR ──
function showLoad(t='Yükleniyor...'){document.getElementById('spinTxt').textContent=t;document.getElementById('loadingOverlay').classList.add('show')}
function hideLoad(){document.getElementById('loadingOverlay').classList.remove('show')}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function mkKey(y,m){return `${y}_${String(m).padStart(2,'0')}`;}
function curKey(){return mkKey(curYear,curMonth);}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}

// ── SEÇİCİLER ──
function initSelects(){
  const ySel=document.getElementById('selYear');
  const mSel=document.getElementById('selMonth');
  for(let y=2024;y<=2030;y++) ySel.innerHTML+=`<option value="${y}"${y===curYear?' selected':''}>${y}</option>`;
  for(let m=1;m<=12;m++) mSel.innerHTML+=`<option value="${m}"${m===curMonth?' selected':''}>${MONTHS[m]}</option>`;
}
function changeDate(){
  curYear=parseInt(document.getElementById('selYear').value);
  curMonth=parseInt(document.getElementById('selMonth').value);
  renderAll();
}

// ── GELİR ──
function getIncome(bid){return S.income?.[curKey()]?.[bid]||0;}
function setIncome(bid,val){
  if(!S.income[curKey()])S.income[curKey()]={};
  S.income[curKey()][bid]=parseFloat(val)||0;
  saveState(S);renderAll();
}

// ── HESAPLAMA ──
function calcBranch(bid){
  const b=S.branches.find(x=>x.id===bid);
  if(!b)return{income:0,coachPay:0,clubPay:0,totalDays:0,coaches:[]};
  const key=curKey();
  const inc=getIncome(bid);
  const pool=inc*0.5;
  const totalW=b.coaches.reduce((s,c)=>s+(c.weight||1),0)||1;

  const coaches=b.coaches.map(c=>{
    const days=(S.attendance?.[key]?.[bid]?.[c.id]||[]).length;
    const ws=days*(c.weight||1);
    return{...c,days,ws};
  });
  const totWs=coaches.reduce((s,c)=>s+c.ws,0);
  const coachesWithPay=coaches.map(c=>({...c,pay:totWs>0?pool*c.ws/totWs:0}));
  const totalDays=coaches.reduce((s,c)=>s+c.days,0);
  const coachPay=coachesWithPay.reduce((s,c)=>s+c.pay,0);
  return{income:inc,coachPay,clubPay:inc-coachPay,totalDays,coaches:coachesWithPay,branch:b};
}

// ── RENDER HEPSİ ──
function renderAll(){
  document.getElementById('dashPeriod').textContent=`${MONTHS[curMonth]} ${curYear}`;
  renderDashboard();
  renderYoklama();
  renderRapor();
  renderAntrenorler();
}

// ── DASHBOARD ──
function renderDashboard(){
  const bids=S.branches.map(b=>b.id);
  let totalIncome=0,totalCoachPay=0,totalClubPay=0,activeBranches=0;
  bids.forEach(bid=>{
    const r=calcBranch(bid);
    totalIncome+=r.income;totalCoachPay+=r.coachPay;totalClubPay+=r.clubPay;
    if(r.totalDays>0)activeBranches++;
  });
  document.getElementById('dashStats').innerHTML=`
    <div class="stat-card"><div class="slbl">Toplam Gelir</div><div class="sval">₺${Math.round(totalIncome).toLocaleString('tr')}</div><div class="ssub">Tüm branşlar</div></div>
    <div class="stat-card" style="border-color:#22c55e"><div class="slbl">Antrenör Havuzu</div><div class="sval">₺${Math.round(totalCoachPay).toLocaleString('tr')}</div><div class="ssub">Ödenecek toplam</div></div>
    <div class="stat-card" style="border-color:#06b6d4"><div class="slbl">Kulüp Payı</div><div class="sval">₺${Math.round(totalClubPay).toLocaleString('tr')}</div><div class="ssub">Kulüp geliri</div></div>
    <div class="stat-card" style="border-color:#8b5cf6"><div class="slbl">Aktif Branş</div><div class="sval">${activeBranches}/${bids.length}</div><div class="ssub">Bu ay</div></div>
  `;
  let html='';
  S.branches.forEach(b=>{
    const r=calcBranch(b.id);
    html+=`<div class="bcard-mini" style="border-top-color:${b.color}">
      <div class="bname"><span>${b.emoji}</span>${b.name}</div>
      <div class="binfo-grid">
        <div class="binfo-item"><div class="lbl">Toplam Gün</div><div class="val">${r.totalDays} gün</div></div>
        <div class="binfo-item"><div class="lbl">Antrenör Payı</div><div class="val">₺${Math.round(r.coachPay).toLocaleString('tr')}</div></div>
        <div class="binfo-item"><div class="lbl">Gelir</div><div class="val">₺${r.income.toLocaleString('tr')}</div></div>
        <div class="binfo-item"><div class="lbl">Kulüp Payı</div><div class="val">₺${Math.round(r.clubPay).toLocaleString('tr')}</div></div>
      </div>
    </div>`;
  });
  document.getElementById('dashCards').innerHTML=html;
}

// ── YOKLAMA ──
function renderYoklama(){
  const key=curKey();
  const days=daysInMonth(curYear,curMonth);
  let html='';
  S.branches.forEach(b=>{
    html+=`<div class="branch-section">
      <div class="bsec-head"><span class="emoji">${b.emoji}</span><span class="bname">${b.name}</span></div>`;
    b.coaches.forEach(c=>{
      const att=S.attendance?.[key]?.[b.id]?.[c.id]||[];
      html+=`<div class="coach-block">
        <div class="coach-lbl">${c.name} <span class="days-count">(${att.length} gün)</span></div>
        <div class="day-grid">`;
      for(let d=1;d<=days;d++){
        html+=`<button class="day-btn${att.includes(d)?' on':''}" onclick="toggleDay('${b.id}','${c.id}',${d},this)">${d}</button>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('yoklamaContent').innerHTML=html;
}

function toggleDay(bid,cid,day,btn){
  const key=curKey();
  if(!S.attendance[key])S.attendance[key]={};
  if(!S.attendance[key][bid])S.attendance[key][bid]={};
  if(!S.attendance[key][bid][cid])S.attendance[key][bid][cid]=[];
  const arr=S.attendance[key][bid][cid];
  const i=arr.indexOf(day);
  if(i>=0){arr.splice(i,1);btn.classList.remove('on');}
  else{arr.push(day);arr.sort((a,b)=>a-b);btn.classList.add('on');}
  saveState(S);
  renderDashboard();renderRapor();renderAntrenorler();
}

function markAll(val){
  const key=curKey();
  const days=daysInMonth(curYear,curMonth);
  S.branches.forEach(b=>{
    if(!S.attendance[key])S.attendance[key]={};
    if(!S.attendance[key][b.id])S.attendance[key][b.id]={};
    b.coaches.forEach(c=>{
      S.attendance[key][b.id][c.id]=val?Array.from({length:days},(_,i)=>i+1):[];
    });
  });
  saveState(S);renderAll();
}

function resetMonth(){
  if(!confirm(`${MONTHS[curMonth]} ${curYear} yoklamasını sıfırlamak istediğinize emin misiniz?`))return;
  delete S.attendance[curKey()];
  saveState(S);renderAll();toast('🗑 Yoklama sıfırlandı');
}

// ── RAPOR ──
function renderRapor(){
  let html='';
  S.branches.forEach(b=>{
    const r=calcBranch(b.id);
    const inc=r.income;
    html+=`<div style="margin-bottom:2rem">
      <div class="inc-bar">
        <div class="inc-bar-inner">
          <label>${b.emoji} ${b.name} — Aylık Gelir (₺):</label>
          <input type="number" min="0" step="100" value="${inc||''}" placeholder="Gelir girin..."
                 onchange="setIncome('${b.id}',this.value)">
        </div>
        ${inc>0?`<div class="inc-summary">
          <span><span class="lbl">Kulüp Payı (%50):</span> ₺${Math.round(r.clubPay).toLocaleString('tr')}</span>
          <span><span class="lbl">Antrenör Havuzu (%50):</span> ₺${Math.round(r.coachPay).toLocaleString('tr')}</span>
        </div>`:''}
      </div>
      <table class="rpt-table">
        <thead><tr>
          <th>Branş</th><th>Antrenör</th><th>Katsayı</th><th>Gün</th>
          ${inc>0?'<th>Ağır. Puan</th><th>Ödeme (₺)</th>':'<th>Durum</th>'}
        </tr></thead>
        <tbody>`;
    r.coaches.forEach(c=>{
      html+=`<tr>
        <td><span class="branch-badge" style="background:${b.color}20;color:${b.color}">${b.emoji} ${b.name}</span></td>
        <td>${c.name}</td>
        <td>x${c.weight}</td>
        <td>${c.days}</td>
        ${inc>0?`<td>${c.ws.toFixed(1)}</td><td class="pay-cell">₺${Math.round(c.pay).toLocaleString('tr')}</td>`
               :`<td style="color:#888;font-size:.8rem">Gelir girilmedi</td>`}
      </tr>`;
    });
    if(inc>0&&r.coaches.length>1){
      html+=`<tr style="background:#f8f9fa;font-weight:800">
        <td colspan="3">TOPLAM</td>
        <td>${r.totalDays}</td>
        <td>${r.coaches.reduce((s,c)=>s+c.ws,0).toFixed(1)}</td>
        <td class="pay-cell">₺${Math.round(r.coachPay).toLocaleString('tr')}</td>
      </tr>`;
    }
    html+=`</tbody></table></div>`;
  });
  document.getElementById('raporContent').innerHTML=html;
}

// ── ANTRENÖR ÖZETİ ──
function renderAntrenorler(){
  const map={};
  S.branches.forEach(b=>{
    const r=calcBranch(b.id);
    r.coaches.forEach(c=>{
      if(!map[c.name])map[c.name]={name:c.name,branches:[],totalDays:0,totalPay:0};
      map[c.name].totalDays+=c.days;
      map[c.name].totalPay+=c.pay;
      map[c.name].branches.push({name:b.name,emoji:b.emoji,color:b.color,days:c.days});
    });
  });
  const coaches=Object.values(map).sort((a,b)=>b.totalDays-a.totalDays);
  let html=`<table class="coach-table"><thead><tr>
    <th>Antrenör</th><th>Branşlar</th><th>Toplam Gün</th><th>Toplam Ödeme</th>
  </tr></thead><tbody>`;
  coaches.forEach(c=>{
    html+=`<tr>
      <td style="font-weight:700">${c.name}</td>
      <td>${c.branches.map(b=>`<span class="branch-badge" style="background:${b.color}20;color:${b.color};margin:.1rem">${b.emoji} ${b.name} (${b.days}g)</span>`).join('')}</td>
      <td style="font-weight:700">${c.totalDays}</td>
      <td style="font-weight:800;color:#16a34a">₺${Math.round(c.totalPay).toLocaleString('tr')}</td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('antrenorContent').innerHTML=html;
}

// ── TABS ──
function showTab(btn,name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── CSV ──
function exportCSV(){
  let csv='Branş,Antrenör,Katsayı,Gün,Ağırlıklı Puan,Ödeme (₺)\n';
  S.branches.forEach(b=>{
    const r=calcBranch(b.id);
    r.coaches.forEach(c=>{
      csv+=`${b.name},${c.name},${c.weight},${c.days},${c.ws.toFixed(1)},${Math.round(c.pay)}\n`;
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv,{type:'text/csv;charset=utf-8;'}]));
  a.download=`DPUSK_Rapor_${curYear}_${curMonth}.csv`;a.click();
}

// ── BAŞLAT ──
initSelects();
hideLoad();
renderAll();
</script>
